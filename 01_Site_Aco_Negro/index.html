<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aço Negro Swordplay | Oficial</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #b22222; /* Vermelho Escuro / Sangue */
            --text: #e0e0e0;
            --steel: #777;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            border: 2px solid var(--steel);
            padding: 3rem;
            background: linear-gradient(145deg, #1f1f1f, #151515);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: 5px;
            color: var(--text);
            text-transform: uppercase;
        }
        .subtitle {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 2rem;
            font-weight: bold;
        }
        .divider {
            height: 2px;
            background-color: var(--accent);
            width: 50%;
            margin: 1rem auto;
        }
        .status-tag {
            font-size: 0.8rem;
            color: var(--steel);
            border: 1px solid var(--steel);
            padding: 5px 10px;
            margin-top: 2rem;
            display: inline-block;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--steel);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aço Negro</h1>
        <div class="subtitle">Swordplay & Comunidade Medieval</div>
        <div class="divider"></div>
        <p>Em breve, o portal oficial do clã estará online.</p>
        <div class="status-tag">STATUS: ACAMPAMENTO SENDO MONTADO</div>
    </div>
    <footer>
        &copy; 2026 Aço Negro Swordplay. Todos os direitos reservados.
    </footer>
</body>
</html>
